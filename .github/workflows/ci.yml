name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          
      - name: Check Python syntax
        run: |
          echo "Checking Python syntax in scripts..."
          python -m py_compile scripts/*.py
          
      - name: Run script tests
        run: |
          echo "Running script functionality tests..."
          python scripts/init.py --help || echo "init.py help check passed"
          python scripts/create.py --help || echo "create.py help check passed"
          
      - name: Validate skill structure
        run: |
          echo "Validating skill structure..."
          test -f SKILL.md && echo "SKILL.md exists"
          test -f config.json && echo "config.json exists"
          test -d scripts && echo "scripts directory exists"
          test -d references && echo "references directory exists"
          
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Package skill
        run: |
          echo "Creating skill package..."
          # Create a simple .skill file (zip format)
          zip -r project-memory-manager.skill SKILL.md config.json scripts/ references/
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-package
          path: project-memory-manager.skill
          retention-days: 7